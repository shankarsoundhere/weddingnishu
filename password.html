<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Access</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:
linear-gradient(rgba(40,0,15,.75),rgba(40,0,15,.75)),
url('https://images.unsplash.com/photo-1519741497674-611481863552?w=2000');
background-size:cover;
background-position:center;
}

.box{
background:rgba(90,0,20,.35);
backdrop-filter:blur(18px);
padding:45px;
border-radius:25px;
text-align:center;
border:1px solid rgba(255,215,0,.4);
box-shadow:0 0 35px rgba(255,215,0,.25);
width:320px;
}

.title{
font-family:'Cinzel',serif;
font-size:28px;
color:#FFD700;
}

.subtitle{
font-size:12px;
letter-spacing:3px;
color:#f2d88a;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#FFD700,#fff3b0);
font-weight:bold;
cursor:pointer;
}

.error{
margin-top:10px;
color:#ff6b6b;
display:none;
}
</style>
</head>

<body>

<div class="box">

<div class="title">Nitish Wedding</div>
<div class="subtitle">PRIVATE ACCESS</div>

<input type="password" id="pass" placeholder="Enter Password 🔒">

<button onclick="check()">ENTER</button>

<div class="error" id="error">❌ Wrong Password</div>

</div>

<script>
function check(){
var pass = document.getElementById("pass").value;

if(pass === "1836348676"){
window.location.href = "second.html";
}else{
document.getElementById("error").style.display = "block";
}
}
</script>

</body>
</html>
