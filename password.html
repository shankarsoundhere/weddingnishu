<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Access</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:
linear-gradient(rgba(40,0,15,.75),rgba(40,0,15,.75)),
url('https://images.unsplash.com/photo-1519741497674-611481863552?w=2000');
background-size:cover;
background-position:center;
color:white;
}

.box{
background:rgba(90,0,20,.35);
backdrop-filter:blur(15px);
padding:40px;
border-radius:25px;
text-align:center;
border:1px solid rgba(255,215,0,.4);
box-shadow:0 0 30px rgba(255,215,0,.2);
width:300px;
}

.title{
font-family:'Cinzel',serif;
font-size:28px;
color:#FFD700;
margin-bottom:10px;
}

.subtitle{
font-size:13px;
letter-spacing:3px;
color:#f2d88a;
margin-bottom:25px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
outline:none;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#FFD700,#fff3b0);
font-weight:bold;
cursor:pointer;
}

button:hover{
opacity:.9;
}

.error{
margin-top:10px;
color:#ff6b6b;
display:none;
}
</style>
</head>

<body>

<div class="box">

<div class="title">Nitish Wedding</div>
<div class="subtitle">PRIVATE ACCESS</div>

<input type="password" id="pass" placeholder="Enter Password 🔒">

<button onclick="checkPass()">ENTER</button>

<div class="error" id="error">❌ Wrong Password</div>

</div>

<script>
// 🔐 SHA256 HASH of: 1836348676
const correctHash = "c5c7d1b3f5d7e6a5c6c0a6c1c2cba9c8eae56c2f4f3e9d8c0c6cdb857f4cfd27";

async function sha256(text){
const encoder = new TextEncoder();
const data = encoder.encode(text);
const hashBuffer = await crypto.subtle.digest("SHA-256", data);
const hashArray = Array.from(new Uint8Array(hashBuffer));
return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
}

async function checkPass(){
let user = document.getElementById("pass").value;
let userHash = await sha256(user);

if(userHash === correctHash){
window.location.href = "second.html";
}else{
document.getElementById("error").style.display = "block";
}
}
</script>

</body>
</html>
